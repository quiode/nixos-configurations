services:
  stalwart:
    image: stalwartlabs/stalwart:v0.16.6
    container_name: stalwart
    ports:
      - 25:25 # SMTP  (explicit TLS => STARTTLS, Authentication is DISABLED => use port 465/587 instead)
      - 143:143 # IMAP4 (explicit TLS => STARTTLS)
      - 465:465 # ESMTP (implicit TLS)
      - 587:587 # ESMTP (explicit TLS => STARTTLS)
      - 993:993 # IMAP4 (implicit TLS)
      - 4190:4190 # ManageSieve (Sieve scripts)
    networks:
      - stalwart
      - monitoring
    restart: always
    env_file:
      - /ssd/critical/stalwart/metrics-secrets.env
    volumes:
      - /ssd/critical/stalwart/etc:/etc/stalwart
      - /ssd/critical/stalwart/data:/var/lib/stalwart
      - /etc/localtime:/etc/localtime:ro
    environment:
      STALWART_PUBLIC_URL: https://mail.dominik-schwaiger.ch
    labels:
      traefik.enable: true
      traefik.docker.network: stalwart
      # Admin UI (port 8080) via Traefik TLS
      traefik.http.routers.stalwart.rule: Host(`mail-admin.dominik-schwaiger.ch`)
      traefik.http.routers.stalwart.entrypoints: websecure
      traefik.http.routers.stalwart.tls: true
      traefik.http.routers.stalwart.tls.certresolver: letsencrypt
      traefik.http.services.stalwart.loadbalancer.server.port: 8080
      # HTTPS (Stalwart handles TLS itself) via TCP passthrough
      traefik.tcp.routers.stalwart-https.rule: HostSNI(`mail.dominik-schwaiger.ch`) || HostSNI(`autodiscover.dominik-schwaiger.ch`) || HostSNI(`autoconfig.dominik-schwaiger.ch`) || HostSNI(`smtp.dominik-schwaiger.ch`) || HostSNI(`imap.dominik-schwaiger.ch`) || HostSNI(`mta-sts.dominik-schwaiger.ch`)
      traefik.tcp.routers.stalwart-https.entrypoints: websecure
      traefik.tcp.routers.stalwart-https.tls.passthrough: true
      traefik.tcp.services.stalwart-https.loadbalancer.server.port: 443
      traefik.tcp.services.stalwart-https.loadbalancer.proxyProtocol.version: 2

networks:
  stalwart:
    name: stalwart
    external: true

  monitoring:
    name: monitoring
    external: true
