log:
  level: "INFO"

api:
  dashboard: true

providers:
  docker:
    exposedByDefault: false

global:
  sendAnonymousUsage: true

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: "websecure"
          scheme: "https"
    transport:
      respondingTimeouts:
        readTimeout: "15m"
        writeTimeout: "15m"
        idleTimeout: "15m"

  websecure:
    address: ":443"
    transport:
      respondingTimeouts:
        readTimeout: "15m"
        writeTimeout: "15m"
        idleTimeout: "15m"

certificatesResolvers:
  letsencrypt:
    acme:
      email: "mail@dominik-schwaiger.ch"
      storage: "/etc/certs/acme.json"
      httpChallenge:
        entryPoint: web
      # TODO: switch to dnsChallenge for wildcard support once lego fixes the Infomaniak provider bug (APIResponse[string] vs integer record ID in CreateDNSRecord)
      # dnsChallenge:
      #   provider: infomaniak
