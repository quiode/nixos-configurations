services:
  ollama:
    image: ollama/ollama
    container_name: ollama
    volumes:
      - /hdd/non-critical/ollama:/root/.ollama
      - /etc/localtime:/etc/localtime:ro
    restart: always
    tty: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: cdi
              device_ids:
                - nvidia.com/gpu=all
              capabilities:
                - gpu
    networks:
      - ollama-internal

  open-webui:
    image: ghcr.io/open-webui/open-webui:0.9-cuda
    container_name: open-webui
    networks:
      - ollama-internal
      - ollama-external
    environment:
      WEBUI_URL: https://chat.dominik-schwaiger.ch
      CUSTOM_NAME: Chat
      USE_CUDA_DOCKER: true
      OLLAMA_BASE_URL: http://ollama:11434
      ENABLE_LOGIN_FORM: false
      ENABLE_OAUTH_SIGNUP: true
      OAUTH_MERGE_ACCOUNTS_BY_EMAIL: true
      OAUTH_PROVIDER_NAME: Authentik
      OPENID_PROVIDER_URL: https://auth.dominik-schwaiger.ch/application/o/open-webui/.well-known/openid-configuration
      OAUTH_SCOPES: openid email profile
      OPENID_REDIRECT_URI: https://chat.dominik-schwaiger.ch/oauth/oidc/callback
    env_file:
      - /ssd/critical/open-webui/secrets.env
    deploy:
      resources:
        reservations:
          devices:
            - driver: cdi
              device_ids:
                - nvidia.com/gpu=all
              capabilities:
                - gpu
    volumes:
      - /hdd/critical/open-webui:/app/backend/data
      - /ssd/non-critical/open-webui/cache:/app/backend/data/cache
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      - ollama
      - meridian
    restart: always
    labels:
      traefik.enable: true
      traefik.docker.network: ollama
      traefik.http.routers.ollama.rule: Host(`chat.dominik-schwaiger.ch`)
      traefik.http.routers.ollama.tls: true
      traefik.http.routers.ollama.tls.certresolver: letsencrypt

  meridian:
    image: ghcr.io/rynfar/meridian:1.29
    container_name: meridian
    environment:
      MERIDIAN_DEFAULT_PROFILE: claude
    env_file:
      - /ssd/critical/meridian/secrets.env
    volumes:
      - /etc/localtime:/etc/localtime:ro
    networks:
      - ollama-internal
    restart: always

networks:
  ollama-internal:
    name: ollama-internal

  ollama-external:
    name: ollama
    external: true
