services:
  ollama:
    image: ollama/ollama:0.31.1
    container_name: ollama
    volumes:
      - /hdd/non-critical/ollama:/root/.ollama
      - /etc/localtime:/etc/localtime:ro
    environment:
      OLLAMA_KEEP_ALIVE: 5m
    restart: always
    tty: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: cdi
              device_ids:
                - nvidia.com/gpu=all
              capabilities:
                - gpu
    networks:
      - ollama-internal

  open-webui:
    image: ghcr.io/open-webui/open-webui:0.10-cuda
    container_name: open-webui
    networks:
      - ollama-internal
      - ollama-external
    environment:
      WEBUI_URL: https://chat.dominik-schwaiger.ch
      CUSTOM_NAME: Chat
      USE_CUDA_DOCKER: true
      OLLAMA_BASE_URL: http://ollama:11434
      ENABLE_LOGIN_FORM: false
      ENABLE_OAUTH_SIGNUP: true
      OAUTH_MERGE_ACCOUNTS_BY_EMAIL: true
      OAUTH_PROVIDER_NAME: Authentik
      OPENID_PROVIDER_URL: https://auth.dominik-schwaiger.ch/application/o/open-webui/.well-known/openid-configuration
      OAUTH_SCOPES: openid email profile
      OPENID_REDIRECT_URI: https://chat.dominik-schwaiger.ch/oauth/oidc/callback
    env_file:
      - /ssd/critical/open-webui/secrets.env
    deploy:
      resources:
        reservations:
          devices:
            - driver: cdi
              device_ids:
                - nvidia.com/gpu=all
              capabilities:
                - gpu
    volumes:
      - /hdd/critical/open-webui:/app/backend/data
      - /ssd/non-critical/open-webui/cache:/app/backend/data/cache
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      - ollama
      - meridian
      - open-terminal
    restart: always
    labels:
      traefik.enable: true
      traefik.docker.network: ollama
      traefik.http.routers.ollama.rule: Host(`chat.dominik-schwaiger.ch`)
      traefik.http.routers.ollama.tls: true
      traefik.http.routers.ollama.tls.certresolver: letsencrypt

  open-terminal:
    image: ghcr.io/open-webui/open-terminal:0.11
    container_name: open-terminal
    networks:
      - ollama-internal
    volumes:
      - /etc/localtime:/etc/localtime:ro
    environment:
      OPEN_TERMINAL_MULTI_USER: true
      OPEN_TERMINAL_API_KEY: open-terminal # local-only, no real secret needed
      OPEN_TERMINAL_PACKAGES: ""
      OPEN_TERMINAL_PIP_PACKAGES: ""
      OPEN_TERMINAL_NPM_PACKAGES: ""
    restart: always

  meridian:
    image: ghcr.io/rynfar/meridian
    container_name: meridian
    volumes:
      - /hdd/critical/meridian:/home/claude
      - /etc/localtime:/etc/localtime:ro
    networks:
      - ollama-internal
    restart: always

networks:
  ollama-internal:
    name: ollama-internal

  ollama-external:
    name: ollama
    external: true
