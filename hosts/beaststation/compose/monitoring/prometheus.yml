global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: traefik
    static_configs:
      - targets: ['traefik:8082']

  - job_name: minecraft
    static_configs:
      - targets: ['mc-monitor:8080']

  - job_name: authentik
    static_configs:
      - targets: ['authentik:9300']

  - job_name: stalwart
    static_configs:
      - targets: ['stalwart:8080']
    metrics_path: /metrics/prometheus
    basic_auth:
      username: prometheus
      password: ${STALWART_METRICS_PASSWORD}
